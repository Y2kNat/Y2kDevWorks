<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - Y2K DevWorks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
      padding: 30px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255, 0, 0, 0.2);
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
    }
    h1 i {
      color: #ff0000;
      margin-right: 10px;
    }
    .btn-logout {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-logout:hover {
      background: #ff0000;
      border-color: #ff0000;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab.active {
      background: #ff0000;
      border-color: #ff0000;
    }
    .tab:hover {
      background: rgba(255, 0, 0, 0.2);
    }
    .panel {
      display: none;
      background: rgba(20, 20, 20, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 16px;
      padding: 30px;
    }
    .panel.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }
    input, textarea {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 0, 0, 0.2);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #ff0000;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
    }
    .btn-save {
      background: linear-gradient(135deg, #ff1a1a, #b30000);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(255, 0, 0, 0.4);
    }
    .success-msg {
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .projeto-item {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 0, 0, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .projeto-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .btn-remove {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-add {
      background: rgba(255, 0, 0, 0.1);
      border: 1px dashed rgba(255, 0, 0, 0.4);
      color: #ff4444;
      padding: 15px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .btn-add:hover {
      background: rgba(255, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-terminal"></i> Painel Administrativo</h1>
      <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('hero')"><i class="fas fa-home"></i> Hero</div>
      <div class="tab" onclick="showTab('projetos')"><i class="fas fa-code"></i> Projetos</div>
      <div class="tab" onclick="showTab('sobre')"><i class="fas fa-user"></i> Sobre</div>
      <div class="tab" onclick="showTab('contato')"><i class="fas fa-envelope"></i> Contato</div>
    </div>

    <!-- PAINEL HERO -->
    <div id="hero-panel" class="panel active">
      <h2 style="margin-bottom: 25px;">Editar Hero Section</h2>
      <div class="form-group">
        <label>Badge</label>
        <input type="text" id="hero-badge" placeholder="Y2K_DevWorks // online">
      </div>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="hero-titulo" placeholder="Bots Discord que fazem a diferença">
      </div>
      <div class="form-group">
        <label>Bio (formato monospace)</label>
        <input type="text" id="hero-bio" placeholder="𝙳𝚎𝚜𝚎𝚗𝚟𝚘𝚕𝚟𝚎𝚍𝚘𝚛 𝚍𝚎 𝚜𝚒𝚜𝚝𝚎𝚖𝚊𝚜 𝚙𝚊𝚛𝚊 𝙳𝚒𝚜𝚌𝚘𝚛𝚍">
      </div>
      <div class="form-group">
        <label>Descrição</label>
        <textarea id="hero-descricao" placeholder="Sistemas personalizados para seu servidor Discord..."></textarea>
      </div>
      
      <h3 style="margin: 30px 0 20px;">Estatísticas</h3>
      <div class="stats-grid">
        <div class="form-group">
          <label>Stat 1 - Valor</label>
          <input type="number" id="stat1-valor" placeholder="150">
        </div>
        <div class="form-group">
          <label>Stat 1 - Label</label>
          <input type="text" id="stat1-label" placeholder="Usuários Ajudados">
        </div>
        <div class="form-group">
          <label>Stat 2 - Valor</label>
          <input type="number" id="stat2-valor" placeholder="6">
        </div>
        <div class="form-group">
          <label>Stat 2 - Label</label>
          <input type="text" id="stat2-label" placeholder="Projetos Ativos">
        </div>
        <div class="form-group">
          <label>Stat 3 - Valor</label>
          <input type="number" id="stat3-valor" placeholder="1">
        </div>
        <div class="form-group">
          <label>Stat 3 - Label</label>
          <input type="text" id="stat3-label" placeholder="Ano de XP">
        </div>
      </div>
      
      <button class="btn-save" onclick="saveHero()"><i class="fas fa-save"></i> Salvar Alterações</button>
      <div class="success-msg" id="hero-success">✅ Alterações salvas com sucesso!</div>
    </div>

    <!-- PAINEL PROJETOS -->
    <div id="projetos-panel" class="panel">
      <h2 style="margin-bottom: 25px;">Gerenciar Projetos</h2>
      <div id="projetos-container"></div>
      <button class="btn-add" onclick="addProjeto()"><i class="fas fa-plus"></i> Adicionar Novo Projeto</button>
      <button class="btn-save" onclick="saveProjetos()" style="margin-top: 30px;"><i class="fas fa-save"></i> Salvar Projetos</button>
      <div class="success-msg" id="projetos-success">✅ Projetos salvos com sucesso!</div>
    </div>

    <!-- PAINEL SOBRE -->
    <div id="sobre-panel" class="panel">
      <h2 style="margin-bottom: 25px;">Editar Seção Sobre</h2>
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="sobre-nome" placeholder="Isac">
      </div>
      <div class="form-group">
        <label>Bio (formato monospace)</label>
        <input type="text" id="sobre-bio" placeholder="𝙳𝚎𝚜𝚎𝚗𝚟𝚘𝚕𝚟𝚎𝚍𝚘𝚛 𝚍𝚎 𝚜𝚒𝚜𝚝𝚎𝚖𝚊𝚜 𝚙𝚊𝚛𝚊 𝙳𝚒𝚜𝚌𝚘𝚛𝚍">
      </div>
      <div class="form-group">
        <label>Texto Sobre</label>
        <textarea id="sobre-texto" placeholder="Meu nome é Isac..."></textarea>
      </div>
      <div class="form-group">
        <label>Skills (separadas por vírgula)</label>
        <input type="text" id="sobre-skills" placeholder="JavaScript, Python, HTML, Discord.js, Node.js, Automação">
      </div>
      <button class="btn-save" onclick="saveSobre()"><i class="fas fa-save"></i> Salvar Alterações</button>
      <div class="success-msg" id="sobre-success">✅ Alterações salvas com sucesso!</div>
    </div>

    <!-- PAINEL CONTATO -->
    <div id="contato-panel" class="panel">
      <h2 style="margin-bottom: 25px;">Editar Contato</h2>
      <div class="form-group">
        <label>Discord</label>
        <input type="text" id="contato-discord" placeholder="@Y2k_Nat">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="contato-email" placeholder="Y2k_Nat@hotmail.com">
      </div>
      <div class="form-group">
        <label>Horário Segunda a Sexta</label>
        <input type="text" id="contato-horario-semana" placeholder="13h às 21h">
      </div>
      <div class="form-group">
        <label>Horário Sábado e Domingo</label>
        <input type="text" id="contato-horario-fim" placeholder="14h às 22h">
      </div>
      <button class="btn-save" onclick="saveContato()"><i class="fas fa-save"></i> Salvar Alterações</button>
      <div class="success-msg" id="contato-success">✅ Alterações salvas com sucesso!</div>
    </div>
  </div>

  <script>
    // Verificar se está logado
    if (!localStorage.getItem('admin_logged')) {
      window.location.href = '/admin/login.html';
    }

    function logout() {
      localStorage.removeItem('admin_logged');
      window.location.href = '/admin/login.html';
    }

    function showTab(tab) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab + '-panel').classList.add('active');
      event.target.classList.add('active');
      
      if (tab === 'projetos') loadProjetos();
    }

    // Carregar dados do JSON
    async function loadData() {
      const res = await fetch('/data/content.json');
      return await res.json();
    }

    // Carregar dados nos campos
    async function loadHero() {
      const data = await loadData();
      document.getElementById('hero-badge').value = data.hero.badge;
      document.getElementById('hero-titulo').value = data.hero.titulo;
      document.getElementById('hero-bio').value = data.hero.bio;
      document.getElementById('hero-descricao').value = data.hero.descricao;
      document.getElementById('stat1-valor').value = data.stats[0].valor;
      document.getElementById('stat1-label').value = data.stats[0].label;
      document.getElementById('stat2-valor').value = data.stats[1].valor;
      document.getElementById('stat2-label').value = data.stats[1].label;
      document.getElementById('stat3-valor').value = data.stats[2].valor;
      document.getElementById('stat3-label').value = data.stats[2].label;
    }

    async function loadProjetos() {
      const data = await loadData();
      const container = document.getElementById('projetos-container');
      container.innerHTML = '';
      data.projetos.forEach((p, i) => {
        container.innerHTML += `
          <div class="projeto-item">
            <div class="projeto-header">
              <strong>Projeto ${i + 1}</strong>
              <button class="btn-remove" onclick="removeProjeto(${i})"><i class="fas fa-trash"></i></button>
            </div>
            <div class="form-group">
              <label>Nome</label>
              <input type="text" id="proj-nome-${i}" value="${p.nome}">
            </div>
            <div class="form-group">
              <label>Tipo</label>
              <input type="text" id="proj-tipo-${i}" value="${p.tipo}">
            </div>
            <div class="form-group">
              <label>Descrição</label>
              <textarea id="proj-desc-${i}">${p.descricao}</textarea>
            </div>
            <div class="form-group">
              <label>Ícone (Font Awesome)</label>
              <input type="text" id="proj-icone-${i}" value="${p.icone}">
            </div>
          </div>
        `;
      });
    }

    async function loadSobre() {
      const data = await loadData();
      document.getElementById('sobre-nome').value = data.sobre.nome;
      document.getElementById('sobre-bio').value = data.sobre.bio;
      document.getElementById('sobre-texto').value = data.sobre.texto;
      document.getElementById('sobre-skills').value = data.sobre.skills.join(', ');
    }

    async function loadContato() {
      const data = await loadData();
      document.getElementById('contato-discord').value = data.contato.discord;
      document.getElementById('contato-email').value = data.contato.email;
      document.getElementById('contato-horario-semana').value = data.contato.horario_semana;
      document.getElementById('contato-horario-fim').value = data.contato.horario_fim;
    }

    // Funções de save
    async function saveHero() {
      const data = await loadData();
      data.hero.badge = document.getElementById('hero-badge').value;
      data.hero.titulo = document.getElementById('hero-titulo').value;
      data.hero.bio = document.getElementById('hero-bio').value;
      data.hero.descricao = document.getElementById('hero-descricao').value;
      data.stats[0].valor = parseInt(document.getElementById('stat1-valor').value);
      data.stats[0].label = document.getElementById('stat1-label').value;
      data.stats[1].valor = parseInt(document.getElementById('stat2-valor').value);
      data.stats[1].label = document.getElementById('stat2-label').value;
      data.stats[2].valor = parseInt(document.getElementById('stat3-valor').value);
      data.stats[2].label = document.getElementById('stat3-label').value;
      
      await saveData(data);
      document.getElementById('hero-success').style.display = 'block';
      setTimeout(() => document.getElementById('hero-success').style.display = 'none', 3000);
    }

    function addProjeto() {
      const container = document.getElementById('projetos-container');
      const i = container.children.length;
      container.innerHTML += `
        <div class="projeto-item">
          <div class="projeto-header">
            <strong>Novo Projeto</strong>
            <button class="btn-remove" onclick="removeProjeto(${i})"><i class="fas fa-trash"></i></button>
          </div>
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="proj-nome-${i}" placeholder="Nome do projeto">
          </div>
          <div class="form-group">
            <label>Tipo</label>
            <input type="text" id="proj-tipo-${i}" placeholder="Tipo do projeto">
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea id="proj-desc-${i}" placeholder="Descrição"></textarea>
          </div>
          <div class="form-group">
            <label>Ícone (Font Awesome)</label>
            <input type="text" id="proj-icone-${i}" placeholder="fa-code">
          </div>
        </div>
      `;
    }

    function removeProjeto(index) {
      event.target.closest('.projeto-item').remove();
    }

    async function saveProjetos() {
      const data = await loadData();
      const projetos = [];
      const items = document.querySelectorAll('.projeto-item');
      
      items.forEach((item, i) => {
        projetos.push({
          nome: document.getElementById(`proj-nome-${i}`)?.value || '',
          tipo: document.getElementById(`proj-tipo-${i}`)?.value || '',
          descricao: document.getElementById(`proj-desc-${i}`)?.value || '',
          icone: document.getElementById(`proj-icone-${i}`)?.value || 'fa-code'
        });
      });
      
      data.projetos = projetos;
      await saveData(data);
      document.getElementById('projetos-success').style.display = 'block';
      setTimeout(() => document.getElementById('projetos-success').style.display = 'none', 3000);
    }

    async function saveSobre() {
      const data = await loadData();
      data.sobre.nome = document.getElementById('sobre-nome').value;
      data.sobre.bio = document.getElementById('sobre-bio').value;
      data.sobre.texto = document.getElementById('sobre-texto').value;
      data.sobre.skills = document.getElementById('sobre-skills').value.split(',').map(s => s.trim());
      
      await saveData(data);
      document.getElementById('sobre-success').style.display = 'block';
      setTimeout(() => document.getElementById('sobre-success').style.display = 'none', 3000);
    }

    async function saveContato() {
      const data = await loadData();
      data.contato.discord = document.getElementById('contato-discord').value;
      data.contato.email = document.getElementById('contato-email').value;
      data.contato.horario_semana = document.getElementById('contato-horario-semana').value;
      data.contato.horario_fim = document.getElementById('contato-horario-fim').value;
      
      await saveData(data);
      document.getElementById('contato-success').style.display = 'block';
      setTimeout(() => document.getElementById('contato-success').style.display = 'none', 3000);
    }

    async function saveData(data) {
      // No Railway, você precisa de uma API para salvar
      // Por enquanto, vamos salvar no localStorage para teste
      localStorage.setItem('site_content', JSON.stringify(data));
      alert('✅ Dados salvos! (Em produção, configure a API)');
    }

    // Carregar dados iniciais
    loadHero();
    loadSobre();
    loadContato();
  </script>
</body>
  </html>
